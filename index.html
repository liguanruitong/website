<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>给妈妈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap');
  @import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css');
  @font-face{
    font-family:"Huiwen Mincho";
    src:url('fonts/huiwen-mincho.woff2') format('woff2');
    font-weight:400;font-display:swap;
  }
  :root{
    --paper:#f4ece0; --card:#fbf6ec; --ink:#3b352c; --faint:#9a8f7c;
    --line:#d8cdb8; --stamp:#c4683f; --stamp2:#7d8a5c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Serif SC",serif;
    background:var(--paper);
    background-image:radial-gradient(circle at 50% 0%, #faf3e6, var(--paper) 70%);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:22px;
  }
  .ticket{
    width:min(92vw,440px);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:4px;
    box-shadow:0 14px 40px rgba(80,60,30,.16);
    position:relative;
    animation:in .6s ease;
  }
  @keyframes in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  /* 顶部票据头 */
  .head{
    border-bottom:1.5px dashed var(--line);
    padding:18px 24px 14px;
    display:flex;justify-content:space-between;align-items:flex-start;
    font-size:11px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase;
  }
  .head .no{font-variant-numeric:tabular-nums;}
  .body{padding:30px 28px 26px;}
  .kicker{font-size:11px;letter-spacing:.22em;color:var(--stamp);text-transform:uppercase;margin-bottom:18px;}

  .scene{font-size:46px;margin-bottom:14px;line-height:1;}
  .pigimg{width:100%;max-width:230px;display:block;margin:0 auto 10px;cursor:pointer;
    filter:drop-shadow(0 6px 10px rgba(80,60,30,.18));transition:transform .12s;}
  .pigimg:active{transform:scale(1.04) rotate(-1deg);}

  /* 贴纸：贴在信上的小黄人 */
  .sticker{position:absolute;cursor:pointer;z-index:6;
    filter:drop-shadow(2px 4px 5px rgba(80,60,30,.28));
    transition:transform .15s ease;}
  .sticker img{display:block;width:100%;
    /* 贴纸白边效果 */
    -webkit-filter:drop-shadow(0 0 2px #fff) drop-shadow(0 0 2px #fff) drop-shadow(0 0 1px #fff);
    filter:drop-shadow(0 0 2px #fff) drop-shadow(0 0 2px #fff) drop-shadow(0 0 1px #fff);}
  .sticker:hover{transform:scale(1.06) rotate(0deg)!important;}
  .sticker:active{transform:scale(1.12)!important;}
  #stickerBob{width:110px;top:-40px;right:18px;transform:rotate(9deg);}
  #stickerDj{width:100px;bottom:18px;left:-34px;transform:rotate(-11deg);}
  @media(max-width:480px){
    #stickerBob{width:84px;top:-30px;right:8px;}
    #stickerDj{width:78px;bottom:14px;left:-16px;}
  }
  .msg{
    font-size:20px;line-height:2;white-space:pre-wrap;
    min-height:130px;display:flex;align-items:center;
    animation:fade .55s ease;font-weight:500;
  }
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;}}
  .msg.big{font-size:25px;font-weight:600;}

  .foot{
    border-top:1.5px dashed var(--line);
    padding:18px 24px 22px;
    display:flex;flex-direction:column;gap:10px;
  }
  button{
    font-family:inherit;cursor:pointer;border:1.5px solid var(--ink);
    background:transparent;color:var(--ink);
    font-size:16px;font-weight:600;letter-spacing:.04em;
    padding:13px 18px;border-radius:2px;width:100%;
    transition:.15s;
  }
  button:active{transform:translateY(2px);}
  button.fill{background:var(--ink);color:var(--card);}
  button.warm{border-color:var(--stamp);color:var(--stamp);}

  .stamp{
    position:absolute;top:14px;right:16px;width:58px;height:58px;
    border:2px solid var(--stamp);border-radius:50%;
    color:var(--stamp);font-size:9px;font-weight:700;letter-spacing:.06em;
    display:flex;align-items:center;justify-content:center;text-align:center;
    transform:rotate(-12deg);opacity:.55;line-height:1.3;
  }
  .perf{height:1px;}

  /* 角色彩蛋区 */
  .pals{display:flex;justify-content:center;gap:18px;padding:8px 0 20px;}
  .pal{font-size:34px;cursor:pointer;line-height:1;transition:transform .12s;user-select:none;animation:bobp 2.6s ease-in-out infinite;}
  .pal:nth-child(2){animation-delay:.4s;} .pal:nth-child(3){animation-delay:.8s;}
  .pal:active{transform:scale(1.3) rotate(-6deg);}
  @keyframes bobp{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  .bubble{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--card);font-size:15px;font-weight:500;
    padding:11px 18px;border-radius:20px;max-width:80vw;text-align:center;
    opacity:0;transition:.3s;z-index:50;pointer-events:none;line-height:1.6;
  }
  .bubble.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .pal-hint{text-align:center;font-size:11px;color:var(--faint);letter-spacing:.1em;padding-bottom:4px;}
  /* 烟花淡入图层 */
  .fireworks{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 50%, rgba(20,12,30,.0), rgba(20,12,30,.0));
    pointer-events:none;transition:background .6s;}
  .fireworks.on{display:flex;background:#000;}
  .fireworks img{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.85);
    width:100vw;height:100vh;object-fit:cover;opacity:0;transition:opacity .15s linear, transform .35s ease;}
  /* 电影黑边 */
  .bar{position:absolute;left:0;right:0;height:11vh;background:#000;z-index:3;
    opacity:0;transition:opacity .4s ease;}
  .fireworks.on .bar{opacity:1;}
  .bar.top{top:0;} .bar.bot{bottom:0;}
  /* 大爱心绽放容器 */
  .heartburst{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    z-index:4;pointer-events:none;width:0;height:0;}
  /* 瀑布流相册 */
  /* 全屏 Bento Grid 相册层 */
  .bento{position:fixed;inset:0;z-index:190;display:none;flex-direction:column;
    align-items:center;justify-content:flex-start;gap:18px;padding:5vh 4vw 16vh;
    background:radial-gradient(circle at 50% 30%, #2a2018, #181109 75%);
    opacity:0;transition:opacity .9s ease;overflow-y:auto;overflow-x:hidden;}
  .bento.on{display:flex;opacity:1;}
  .bento h2{font-family:"Huiwen Mincho","Noto Serif SC",serif;
    color:#f0e4cf;font-size:clamp(20px,3vw,30px);letter-spacing:.16em;
    font-weight:400;margin-bottom:2px;text-shadow:0 2px 14px rgba(0,0,0,.5);}
  .bento .sub{font-family:"Huiwen Mincho","Noto Serif SC",serif;color:#bcab8e;
    font-size:13px;letter-spacing:.28em;margin-top:-12px;}
  .bentogrid{display:grid;gap:14px;width:min(1040px,94vw);
    grid-template-columns:repeat(4,1fr);grid-auto-rows:150px;grid-auto-flow:dense;}
  .bentogrid .cell{position:relative;overflow:hidden;border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;transform:scale(.92) translateY(14px);
    animation:bcell .7s cubic-bezier(.2,.7,.3,1) forwards;background:#0d0906;}
  .bentogrid .cell img{width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .5s ease;}
  .bentogrid .cell.full img{object-fit:contain;background:#0d0906;}
  .bentogrid .cell:hover img{transform:scale(1.06);}
  /* 大小对比:1张大(2x2)、几张竖(1x2)、余 1x1 */
  .bentogrid .big{grid-column:span 2;grid-row:span 2;}
  .bentogrid .tall{grid-row:span 2;}
  .bentogrid .wide{grid-column:span 2;}
  @keyframes bcell{to{opacity:1;transform:scale(1) translateY(0);}}
  /* 固定右下半透明圆形继续按钮 */
  .bento-fab{position:fixed;right:26px;bottom:26px;z-index:198;
    width:60px;height:60px;border-radius:50%;
    border:1.5px solid rgba(255,255,255,.55);
    background:rgba(255,255,255,.12);backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;cursor:pointer;
    color:#f5ecda;font-size:24px;line-height:1;transition:.18s;
    box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .bento-fab:hover{background:rgba(255,255,255,.24);transform:scale(1.08);}
  .bento-fab:active{transform:scale(.94);}
  .bento.on ~ .bento-fab{display:flex;}
  @media(max-width:680px){
    .bentogrid{grid-template-columns:repeat(2,1fr);grid-auto-rows:120px;width:94vw;}
    .bentogrid .big{grid-column:span 2;grid-row:span 2;}
    .bentogrid .wide{grid-column:span 2;}
    .bento-fab{right:18px;bottom:18px;width:52px;height:52px;font-size:21px;}
  }
  /* 时光机过场 */
  .timewarp{position:fixed;inset:0;z-index:200;background:#000;display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:14px;
    opacity:0;transition:opacity .8s ease;}
  .timewarp.on{display:flex;opacity:1;}
  .timewarp .l1{font-family:"Huiwen Mincho","LXGW WenKai","Noto Serif SC",serif;
    color:#f3ead6;font-size:clamp(22px,5vw,34px);letter-spacing:.18em;
    opacity:0;transform:translateY(8px);transition:.9s ease;}
  .timewarp .l2{font-family:"Huiwen Mincho","LXGW WenKai","Noto Serif SC",serif;
    color:#b9a98a;font-size:clamp(13px,3vw,18px);letter-spacing:.32em;font-style:italic;
    opacity:0;transform:translateY(8px);transition:.9s ease .25s;}
  .timewarp.show-text .l1,.timewarp.show-text .l2{opacity:1;transform:translateY(0);}
  .timewarp .spark{position:absolute;width:3px;height:3px;border-radius:50%;
    background:#ffe9b0;opacity:.0;pointer-events:none;}
</style>
</head>
<body>
<div class="fireworks" id="fireworks">
  <img id="fwImg" src="img/firework.jpg" alt="" />
  <div class="bar top"></div>
  <div class="bar bot"></div>
  <div class="heartburst" id="heartburst"></div>
</div>
<div class="timewarp" id="timewarp">
  <div class="l1">正在乘坐时光机......</div>
  <div class="l2">DIVING BACK IN TIME.....</div>
</div>
<div class="bento" id="bento">
  <h2>我们一起走过的时光</h2>
  <div class="sub">OUR GOOD OLD DAYS</div>
  <div class="bentogrid" id="bentogrid"></div>
</div>
<button class="bento-fab" id="bentoBtn" title="继续" aria-label="继续">→</button>
<div class="ticket">
  <div class="sticker" id="stickerBob"><img src="img/bob_cut.png" alt="小黄人鲍勃" /></div>
  <div class="sticker" id="stickerDj"><img src="img/dj_cut.png" alt="小黄人DJ" /></div>
  <div class="head">
    <span>童童 → 妈妈</span>
    <span class="no" id="no">NO. 01</span>
  </div>
  <div class="body">
    <div class="kicker" id="kicker">一封笨笨的道歉</div>
    <img class="pigimg" id="pigimg" src="img/pig_cut.png" alt="小猪" />
    <div class="msg" id="msg"></div>
  </div>
  <div class="foot" id="foot"></div>
  <div class="stamp">猪猪<br>专属</div>
  <div class="pal-hint">戳小猪、也戳戳角落里的小黄人贴纸 · 它们会说话</div>
</div>
<div class="bubble" id="bubble"></div>

<script>
const nodes={
  start:{s:"🐷",k:"一封笨笨的道歉",t:"妈妈,是童童。\n你先别划走......\n我有话,不太会说,\n但想跟你说。",
    o:[{l:"你说吧",go:"a1",fill:1},{l:"哼。",go:"a1b"}]},

  a1:{s:"🍌",k:"开头",t:"谢谢你没走。\n我知道这几天\n把你气得够呛。",o:[{l:"嗯",go:"c1"}]},
  a1b:{s:"🥺",k:"开头",t:"你生气是对的。\n是我嘴太欠了。\n那你气归气,\n听我说完行吗。",o:[{l:"......行",go:"c1"}]},

  c1:{s:"💛",k:"正题",t:"那天我说的那些话,\n说你白付出、\n说那些难听的--\n我错了,是真的错了。",o:[{l:"然后呢",go:"c2"}]},
  c2:{s:"😔",k:"正题",t:"对不起。\n我不是随便说说,\n是我这几天每每\n自己回想起来\n都难受的那种对不起。",o:[{l:"......",go:"q1"}]},

  q1:{s:"🤍",k:"问你一句",t:"我问你个事--\n你还记不记得\n我小时候老黏着你、\n喊你抱的样子?",
    o:[{l:"记得啊",go:"q1a",fill:1},{l:"记得,你这猪",go:"q1b",warm:1}]},
  q1a:{s:"🥹",k:"心里话",t:"那个童童没走。\n这阵子是我不懂事,\n说了不该说的话,\n我知道错了。",o:[{l:"继续",go:"c3"}]},
  q1b:{s:"🐷",k:"心里话",t:"对,我就是你那只猪。\n你笑我猪的时候\n我其实是乐的。\n这回是我这猪不懂事,\n气着你了。",o:[{l:"继续",go:"c3"}]},

  c3:{s:"🐥",k:"想让你知道",t:"那些话不是你的错,\n是我不该说。\n我不该拿你\n出气。",o:[{l:"嗯",go:"c4"}]},
  c4:{s:"🌧️",k:"想让你知道",t:"不管怎么样,\n发脾气都是我不对。\n这件事是我错了,\n我在学怎么好好说话。",o:[{l:"继续",go:"q2"}]},

  q2:{s:"💭",k:"再问你一句",t:"亲爱的momoko😼\n还愿意再给我\n一次好好说话的机会吗?",
    o:[{l:"傻孩子",go:"c5",fill:1},{l:"看你表现",go:"c5",warm:1}]},

  c5:{s:"💛",k:"我想说的",t:"我是个肯努力的孩子。\n我只是想让你看见\n那个在使劲的童童,\n不是只会闯祸的那个。",o:[{l:"最后一步",go:"hug"}]},

  hug:{s:"🫶",k:"替我抱抱你",t:"按住键盘上的「T」键,\n别松手,数到三——\n那是我想给你的\n那个长长的抱抱。",
    o:[{l:"(按住 T 键 3 秒)",go:"gallery",hugkey:1}]},

  gallery:{s:"🖼️",k:"我们的样子",t:"这些,\n是我们待过的好时候。\n往下慢慢看~",gallery:1,
    o:[{l:"看完啦,继续",go:"final",fill:1}]},

  final:{s:"🐷",k:"完",t:"爱你的童童,\n希望你永远\n幸福快乐做自己。",end:1,
    o:[{l:"再看一遍",go:"start"}]},
};

const galleryImgs=["img/g1.jpg","img/g2.jpg","img/g3.jpg","img/g4.jpg","img/g5.jpg","img/g6.jpg","img/g7.jpg","img/g8.jpg","img/g9.jpg","img/g10.jpg","img/g11.jpg"];
const S={textContent:""};
const M=document.getElementById("msg");
const F=document.getElementById("foot");
const K=document.getElementById("kicker");
const NO=document.getElementById("no");
let cur="start", count=1;

function render(){
  const n=nodes[cur];
  S.textContent=n.s;
  K.textContent=n.k;
  NO.textContent="NO. "+String(count).padStart(2,"0");
  M.className="msg"+((cur==="start"||n.end)?" big":"");
  M.textContent=n.t;
  M.style.animation="none";void M.offsetWidth;M.style.animation="";
  // 瀑布流相册
  const oldG=document.getElementById("galleryBox"); if(oldG) oldG.remove();
  if(n.gallery){
    const g=document.createElement("div");
    g.className="gallery"; g.id="galleryBox";
    galleryImgs.forEach((src,i)=>{ const im=new Image(); im.src=src; im.style.animationDelay=(i*0.08)+"s"; g.appendChild(im); });
    M.parentNode.insertBefore(g, M.nextSibling);
  }
  F.innerHTML="";
  n.o.forEach(o=>{
    const b=document.createElement("button");
    b.textContent=o.l;
    if(o.fill)b.classList.add("fill");
    if(o.warm)b.classList.add("warm");
    if(o.hugkey){
      b.classList.add("fill");
      b.id="hugBtn";
      setupHug(b,o.go);
    } else {
      b.onclick=()=>{ if(o.hug)burst(); if(!n.end)count++; if(cur==="final"&&o.go==="start")count=1; cur=o.go; render(); };
    }
    F.appendChild(b);
  });
}
function burst(big){
  // 普通小爆（贴纸/小猪用）
  const N = big? 46 : 18;
  const layer = big ? document.body : document.body;
  const vmin = Math.min(window.innerWidth, window.innerHeight);
  for(let k=0;k<N;k++){
    const h=document.createElement("div");
    const hearts=["💛","🧡","❤️","💖","✨"];
    h.textContent=big? hearts[Math.random()*hearts.length|0] : "💛";
    h.style.position="fixed";
    h.style.left="50%";h.style.top="50%";
    // 大绽放：爱心散布到约半屏(vmin*0.5)，字号大
    const baseFont = big ? (26+Math.random()*38) : 22;
    h.style.fontSize=baseFont+"px";
    h.style.zIndex="120";h.style.pointerEvents="none";
    h.style.willChange="transform,opacity";
    document.body.appendChild(h);
    const a=Math.random()*6.28;
    const d = big ? (vmin*0.18 + Math.random()*vmin*0.34) : (70+Math.random()*120);
    const dur = big ? (1100+Math.random()*700) : 850;
    h.animate([
      {transform:"translate(-50%,-50%) scale(.2) rotate(0deg)",opacity:1},
      {transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(${big?1.8:1.3}) rotate(${(Math.random()*60-30)|0}deg)`,opacity:0}
    ],{duration:dur,easing:"cubic-bezier(.15,.7,.3,1)"});
    setTimeout(()=>h.remove(),dur);
  }
}
// ====== 按住 T 键 3 秒抱抱 ======
let hugCleanup=null;
function setupHug(btn, goNode){
  let holding=false, start=0, raf=null, done=false;
  const HOLD=3000;
  const fwImg=document.getElementById("fwImg");
  const fwLayer=document.getElementById("fireworks");

  function progressUI(p){
    btn.textContent = p<=0 ? "(按住 T 键 3 秒)" : (p>=1? "抱住了 🫶" : "抱紧中… "+Math.ceil(3-3*p)+"  ");
    // 烟花图随进度由淡到浓
    if(fwLayer){ fwLayer.style.pointerEvents="none"; }
    if(fwImg){ fwImg.style.opacity = (p).toFixed(3); fwImg.style.transform = "translate(-50%,-50%) scale("+(0.85+p*0.15).toFixed(3)+")"; }
  }
  function tick(){
    if(!holding) return;
    const p=Math.min(1,(performance.now()-start)/HOLD);
    progressUI(p);
    if(p>=1){ success(); return; }
    raf=requestAnimationFrame(tick);
  }
  function down(){
    if(done||holding) return;
    holding=true; start=performance.now();
    if(fwLayer) fwLayer.classList.add("on");
    raf=requestAnimationFrame(tick);
  }
  function up(){
    if(done) return;
    holding=false; if(raf)cancelAnimationFrame(raf);
    progressUI(0);
    if(fwImg) fwImg.style.opacity="0";
    if(fwLayer) fwLayer.classList.remove("on");
  }
  function success(){
    done=true; holding=false;
    if(fwImg){ fwImg.style.opacity="1"; fwImg.style.transform="translate(-50%,-50%) scale(1.0)"; }
    burst(true);
    setTimeout(()=>burst(true),350);
    setTimeout(()=>burst(true),720);
    btn.textContent="抱住了 🫶";
    cleanup();
    // 烟花放完(约2秒) → 纯黑屏静默1秒 → 中央双行字淡入 → 停留 → 进下一步
    setTimeout(()=>{
      const tw=document.getElementById("timewarp");
      tw.classList.add("on");           // 纯黑屏淡入(0.8s),此刻不出字
      if(fwLayer) fwLayer.classList.remove("on");
      if(fwImg) fwImg.style.opacity="0";
      // 黑屏静默约1秒后,再出字 + 飞一些小火星
      setTimeout(()=>{
        tw.classList.add("show-text");   // 双行文字淡入
        for(let i=0;i<40;i++){ const sp=document.createElement("div"); sp.className="spark";
          sp.style.left="50%"; sp.style.top="50%"; tw.appendChild(sp);
          const a=Math.random()*6.28,d=60+Math.random()*Math.min(innerWidth,innerHeight)*0.5;
          sp.animate([{transform:"translate(-50%,-50%) scale(0)",opacity:0},
            {transform:"translate(-50%,-50%) scale(1)",opacity:.9,offset:.2},
            {transform:`translate(${Math.cos(a)*d-50}%,${Math.sin(a)*d-50}%) scale(.4)`,opacity:0}],
            {duration:1600,easing:"ease-out"}); setTimeout(()=>sp.remove(),1600); }
      }, 1000);
      // 字停留约2.4秒 → 黑屏淡出 → 全屏 Bento 相册
      setTimeout(()=>{
        tw.classList.remove("show-text");
        startBento(()=>{ count++; cur="final"; render(); });   // Bento继续后直接进结尾
        setTimeout(()=>tw.classList.remove("on"), 900);
      }, 3800);
    }, 2000);
  }
  function onKeyDown(e){ if((e.key==="t"||e.key==="T")&&!e.repeat) down(); }
  function onKeyUp(e){ if(e.key==="t"||e.key==="T") up(); }
  function cleanup(){
    document.removeEventListener("keydown",onKeyDown);
    document.removeEventListener("keyup",onKeyUp);
    btn.removeEventListener("mousedown",down);
    btn.removeEventListener("mouseup",up);
    btn.removeEventListener("mouseleave",up);
    btn.removeEventListener("touchstart",tdown);
    btn.removeEventListener("touchend",up);
    hugCleanup=null;
  }
  function tdown(e){ e.preventDefault(); down(); }
  // 键盘（电脑）
  document.addEventListener("keydown",onKeyDown);
  document.addEventListener("keyup",onKeyUp);
  // 兼容鼠标/触屏按住（手机没T键时也能用）
  btn.addEventListener("mousedown",down);
  btn.addEventListener("mouseup",up);
  btn.addEventListener("mouseleave",up);
  btn.addEventListener("touchstart",tdown,{passive:false});
  btn.addEventListener("touchend",up);
  progressUI(0);
  hugCleanup=cleanup;
}

function startBento(onDone){
  const layer=document.getElementById("bento");
  const grid=document.getElementById("bentogrid");
  const btn=document.getElementById("bentoBtn");
  btn.style.display=""; // 重置内联，让 CSS 控制显隐（重进时生效）
  grid.innerHTML="";
  if(!galleryImgs.length){ onDone&&onDone(); return; }
  // 无限随机瀑布流：循环复用这些图，随机打散；每张卡的形状按它实际拿到那张图的真实比例决定，
  // 所以既无限刷新、又不会横图塞竖框/竖图塞横框；图 load 完才淡入，不会出现纯黑空卡。
  function shapeFor(im){
    const r=(im.naturalWidth||1)/(im.naturalHeight||1);
    if(r<0.85) return "tall";   // 竖图 -> 1x2
    if(r>1.2)  return "wide";   // 横图 -> 2x1
    return "";                   // 近方形 -> 1x1
  }
  // 洗牌队列循环取图，避免连续重复
  let bag=[];
  function nextSrc(){
    if(!bag.length){ bag=galleryImgs.slice(); for(let i=bag.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[bag[i],bag[j]]=[bag[j],bag[i]];} }
    return bag.pop();
  }
  let seq=0;
  function addCard(){
    const src=nextSrc();
    const c=document.createElement("div");
    c.className="cell";
    c.style.opacity="0";                 // load 前不显示，杜绝黑卡
    const im=new Image(); im.alt="";
    const reveal=()=>{ c.classList.add(shapeFor(im)); c.style.opacity=""; c.style.animation="bcell .7s cubic-bezier(.2,.7,.3,1) forwards"; };
    im.onload=reveal;
    im.src=src;
    if(im.complete && im.naturalWidth) reveal();
    c.appendChild(im); grid.appendChild(c);
    seq++;
  }
  function addBatch(n){ for(let j=0;j<n;j++) addCard(); }
  addBatch(Math.max(14, galleryImgs.length+3)); // 首屏铺一批

  layer.style.display="flex"; requestAnimationFrame(()=>layer.classList.add("on"));
  layer.scrollTop=0;

  // 背景随滚动在暖色系间循环柔和变色（无限滚动用循环进度）
  const palette=[[42,32,24],[58,38,26],[74,44,30],[48,36,28],[34,26,20]];
  const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
  const applyBg=(p)=>{
    p=((p%1)+1)%1*(palette.length-1);
    const i=Math.min(palette.length-2,Math.floor(p)); const f=p-i;
    const c1=palette[i],c2=palette[i+1];
    const top=[lerp(c1[0],c2[0],f),lerp(c1[1],c2[1],f),lerp(c1[2],c2[2],f)];
    const bot=top.map(v=>Math.max(0,v-14));
    layer.style.background=`radial-gradient(circle at 50% 30%, rgb(${top[0]},${top[1]},${top[2]}), rgb(${bot[0]},${bot[1]},${bot[2]}) 80%)`;
  };
  const onScroll=()=>{
    applyBg(layer.scrollTop/1400);              // 每 1400px 一个变色循环
    if(layer.scrollTop+layer.clientHeight > layer.scrollHeight-700){ addBatch(8); } // 接近底部就续
  };
  layer.addEventListener("scroll",onScroll,{passive:true});
  applyBg(0);

  let gone=false;
  btn.onclick=()=>{ if(gone)return; gone=true; layer.removeEventListener("scroll",onScroll);
    layer.classList.remove("on"); btn.style.display="none";
    setTimeout(()=>{layer.style.display="none"; onDone&&onDone();},900); };
}

render();
