<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>给妈妈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap');
  :root{
    --paper:#f4ece0; --card:#fbf6ec; --ink:#3b352c; --faint:#9a8f7c;
    --line:#d8cdb8; --stamp:#c4683f; --stamp2:#7d8a5c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Serif SC",serif;
    background:var(--paper);
    background-image:radial-gradient(circle at 50% 0%, #faf3e6, var(--paper) 70%);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:22px;
  }
  .ticket{
    width:min(92vw,440px);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:4px;
    box-shadow:0 14px 40px rgba(80,60,30,.16);
    position:relative;
    animation:in .6s ease;
  }
  @keyframes in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  /* 顶部票据头 */
  .head{
    border-bottom:1.5px dashed var(--line);
    padding:18px 24px 14px;
    display:flex;justify-content:space-between;align-items:flex-start;
    font-size:11px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase;
  }
  .head .no{font-variant-numeric:tabular-nums;}
  .body{padding:30px 28px 26px;}
  .kicker{font-size:11px;letter-spacing:.22em;color:var(--stamp);text-transform:uppercase;margin-bottom:18px;}

  .scene{font-size:46px;margin-bottom:14px;line-height:1;}
  .pigimg{width:100%;max-width:230px;display:block;margin:0 auto 10px;cursor:pointer;
    filter:drop-shadow(0 6px 10px rgba(80,60,30,.18));transition:transform .12s;}
  .pigimg:active{transform:scale(1.04) rotate(-1deg);}

  /* 贴纸：贴在信上的小黄人 */
  .sticker{position:absolute;cursor:pointer;z-index:6;
    filter:drop-shadow(2px 4px 5px rgba(80,60,30,.28));
    transition:transform .15s ease;}
  .sticker img{display:block;width:100%;
    /* 贴纸白边效果 */
    -webkit-filter:drop-shadow(0 0 2px #fff) drop-shadow(0 0 2px #fff) drop-shadow(0 0 1px #fff);
    filter:drop-shadow(0 0 2px #fff) drop-shadow(0 0 2px #fff) drop-shadow(0 0 1px #fff);}
  .sticker:hover{transform:scale(1.06) rotate(0deg)!important;}
  .sticker:active{transform:scale(1.12)!important;}
  #stickerBob{width:110px;top:-40px;right:18px;transform:rotate(9deg);}
  #stickerDj{width:100px;bottom:18px;left:-34px;transform:rotate(-11deg);}
  @media(max-width:480px){
    #stickerBob{width:84px;top:-30px;right:8px;}
    #stickerDj{width:78px;bottom:14px;left:-16px;}
  }
  .msg{
    font-size:20px;line-height:2;white-space:pre-wrap;
    min-height:130px;display:flex;align-items:center;
    animation:fade .55s ease;font-weight:500;
  }
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;}}
  .msg.big{font-size:25px;font-weight:600;}

  .foot{
    border-top:1.5px dashed var(--line);
    padding:18px 24px 22px;
    display:flex;flex-direction:column;gap:10px;
  }
  button{
    font-family:inherit;cursor:pointer;border:1.5px solid var(--ink);
    background:transparent;color:var(--ink);
    font-size:16px;font-weight:600;letter-spacing:.04em;
    padding:13px 18px;border-radius:2px;width:100%;
    transition:.15s;
  }
  button:active{transform:translateY(2px);}
  button.fill{background:var(--ink);color:var(--card);}
  button.warm{border-color:var(--stamp);color:var(--stamp);}

  .stamp{
    position:absolute;top:14px;right:16px;width:58px;height:58px;
    border:2px solid var(--stamp);border-radius:50%;
    color:var(--stamp);font-size:9px;font-weight:700;letter-spacing:.06em;
    display:flex;align-items:center;justify-content:center;text-align:center;
    transform:rotate(-12deg);opacity:.55;line-height:1.3;
  }
  .perf{height:1px;}

  /* 角色彩蛋区 */
  .pals{display:flex;justify-content:center;gap:18px;padding:8px 0 20px;}
  .pal{font-size:34px;cursor:pointer;line-height:1;transition:transform .12s;user-select:none;animation:bobp 2.6s ease-in-out infinite;}
  .pal:nth-child(2){animation-delay:.4s;} .pal:nth-child(3){animation-delay:.8s;}
  .pal:active{transform:scale(1.3) rotate(-6deg);}
  @keyframes bobp{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  .bubble{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--card);font-size:15px;font-weight:500;
    padding:11px 18px;border-radius:20px;max-width:80vw;text-align:center;
    opacity:0;transition:.3s;z-index:50;pointer-events:none;line-height:1.6;
  }
  .bubble.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .pal-hint{text-align:center;font-size:11px;color:var(--faint);letter-spacing:.1em;padding-bottom:4px;}
  /* 烟花淡入图层 */
  .fireworks{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 50%, rgba(20,12,30,.0), rgba(20,12,30,.0));
    pointer-events:none;transition:background .6s;}
  .fireworks.on{display:flex;background:radial-gradient(circle at 50% 50%, rgba(20,12,30,.35), rgba(20,12,30,.6));}
  .fireworks img{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.7);
    max-width:88vw;max-height:80vh;opacity:0;transition:opacity .12s linear, transform .25s ease;
    filter:drop-shadow(0 0 30px rgba(255,210,120,.5));}
  /* 瀑布流相册 */
  .gallery{column-count:2;column-gap:10px;margin:6px 0 4px;}
  .gallery img{width:100%;border-radius:6px;margin-bottom:10px;display:block;
    border:4px solid #fff;box-shadow:0 4px 10px rgba(80,60,30,.2);
    break-inside:avoid;animation:gfade .6s ease both;}
  @keyframes gfade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="fireworks" id="fireworks">
  <img id="fwImg" src="img/firework.png" alt="" />
</div>
<div class="ticket">
  <div class="sticker" id="stickerBob"><img src="img/bob_cut.png" alt="小黄人鲍勃" /></div>
  <div class="sticker" id="stickerDj"><img src="img/dj_cut.png" alt="小黄人DJ" /></div>
  <div class="head">
    <span>童童 → 妈妈</span>
    <span class="no" id="no">NO. 01</span>
  </div>
  <div class="body">
    <div class="kicker" id="kicker">一封笨笨的道歉</div>
    <img class="pigimg" id="pigimg" src="img/pig_cut.png" alt="小猪" />
    <div class="msg" id="msg"></div>
  </div>
  <div class="foot" id="foot"></div>
  <div class="stamp">猪猪<br>专属</div>
  <div class="pal-hint">戳小猪、也戳戳角落里的小黄人贴纸 · 它们会说话</div>
</div>
<div class="bubble" id="bubble"></div>

<script>
const nodes={
  start:{s:"🐷",k:"一封笨笨的道歉",t:"妈妈,是童童。\n你先别划走......\n我有话,不太会说,\n但想跟你说。",
    o:[{l:"你说吧",go:"a1",fill:1},{l:"哼。",go:"a1b"}]},

  a1:{s:"🍌",k:"开头",t:"谢谢你没走。\n我知道这几天\n把你气得够呛。",o:[{l:"嗯",go:"c1"}]},
  a1b:{s:"🥺",k:"开头",t:"你生气是对的。\n是我嘴太欠了。\n那你气归气,\n听我说完行吗。",o:[{l:"......行",go:"c1"}]},

  c1:{s:"💛",k:"正题",t:"那天我说的那些话,\n说你白付出、\n说那些难听的--\n我错了,是真的错了。",o:[{l:"然后呢",go:"c2"}]},
  c2:{s:"😔",k:"正题",t:"对不起。\n我不是随便说说,\n是我这几天每每\n自己回想起来\n都难受的那种对不起。",o:[{l:"......",go:"q1"}]},

  q1:{s:"🤍",k:"问你一句",t:"我问你个事--\n你还记不记得\n我小时候老黏着你、\n喊你抱的样子?",
    o:[{l:"记得啊",go:"q1a",fill:1},{l:"记得,你这猪",go:"q1b",warm:1}]},
  q1a:{s:"🥹",k:"心里话",t:"那个童童没走。\n这阵子是我不懂事,\n说了不该说的话,\n我知道错了。",o:[{l:"继续",go:"c3"}]},
  q1b:{s:"🐷",k:"心里话",t:"对,我就是你那只猪。\n你骂我猪的时候\n我其实是乐的。\n这回是我这猪不懂事,\n气着你了。",o:[{l:"继续",go:"c3"}]},

  c3:{s:"🐥",k:"想让你知道",t:"那些话不是你的错,\n是我不该说。\n我不该拿你\n出气。",o:[{l:"嗯",go:"c4"}]},
  c4:{s:"🌧️",k:"想让你知道",t:"不管怎么样,\n发脾气都是我不对。\n这件事是我错了,\n我在学怎么好好说话。",o:[{l:"继续",go:"q2"}]},

  q2:{s:"💭",k:"再问你一句",t:"亲爱的momoko😼\n还愿意再给我\n一次好好说话的机会吗?",
    o:[{l:"傻孩子",go:"c5",fill:1},{l:"看你表现",go:"c5",warm:1}]},

  c5:{s:"💛",k:"我想说的",t:"我是个肯努力的孩子。\n我只是想让你看见\n那个在使劲的童童,\n不是只会闯祸的那个。",o:[{l:"最后一步",go:"hug"}]},

  hug:{s:"🫶",k:"替我抱抱你",t:"按住键盘上的「T」键,\n别松手,数到三——\n那是我想给你的\n那个长长的抱抱。",
    o:[{l:"(按住 T 键 3 秒)",go:"gallery",hugkey:1}]},

  gallery:{s:"🖼️",k:"我们的样子",t:"这些,\n是我们待过的好时候。\n往下慢慢看~",gallery:1,
    o:[{l:"看完啦,继续",go:"final",fill:1}]},

  final:{s:"🐷",k:"完",t:"妈妈,我爱你。\n我们和好吧。\n以后我想跟你\n慢慢地、好好地说话。\n\n--童童\n(这是我一页页\n给你做的)",end:1,
    o:[{l:"再看一遍",go:"start"}]},
};

const galleryImgs=["img/g1.jpg","img/g2.jpg","img/g3.jpg","img/g4.jpg"];
const S={textContent:""};
const M=document.getElementById("msg");
const F=document.getElementById("foot");
const K=document.getElementById("kicker");
const NO=document.getElementById("no");
let cur="start", count=1;

function render(){
  const n=nodes[cur];
  S.textContent=n.s;
  K.textContent=n.k;
  NO.textContent="NO. "+String(count).padStart(2,"0");
  M.className="msg"+((cur==="start"||n.end)?" big":"");
  M.textContent=n.t;
  M.style.animation="none";void M.offsetWidth;M.style.animation="";
  // 瀑布流相册
  const oldG=document.getElementById("galleryBox"); if(oldG) oldG.remove();
  if(n.gallery){
    const g=document.createElement("div");
    g.className="gallery"; g.id="galleryBox";
    galleryImgs.forEach((src,i)=>{ const im=new Image(); im.src=src; im.style.animationDelay=(i*0.08)+"s"; g.appendChild(im); });
    M.parentNode.insertBefore(g, M.nextSibling);
  }
  F.innerHTML="";
  n.o.forEach(o=>{
    const b=document.createElement("button");
    b.textContent=o.l;
    if(o.fill)b.classList.add("fill");
    if(o.warm)b.classList.add("warm");
    if(o.hugkey){
      b.classList.add("fill");
      b.id="hugBtn";
      setupHug(b,o.go);
    } else {
      b.onclick=()=>{ if(o.hug)burst(); if(!n.end)count++; if(cur==="final"&&o.go==="start")count=1; cur=o.go; render(); };
    }
    F.appendChild(b);
  });
}
function burst(){
  for(let k=0;k<20;k++){
    const h=document.createElement("div");
    h.textContent="💛";h.style.position="fixed";
    h.style.left="50%";h.style.top="55%";h.style.fontSize="22px";
    h.style.zIndex="99";h.style.pointerEvents="none";
    document.body.appendChild(h);
    const a=Math.random()*6.28,d=70+Math.random()*120;
    h.animate([{transform:"translate(-50%,-50%) scale(.3)",opacity:1},
      {transform:`translate(${Math.cos(a)*d-50}%,${Math.sin(a)*d-50}%) scale(1.3)`,opacity:0}],
      {duration:850,easing:"ease-out"});
    setTimeout(()=>h.remove(),850);
  }
}
// ====== 按住 T 键 3 秒抱抱 ======
let hugCleanup=null;
function setupHug(btn, goNode){
  let holding=false, start=0, raf=null, done=false;
  const HOLD=3000;
  const fwImg=document.getElementById("fwImg");
  const fwLayer=document.getElementById("fireworks");

  function progressUI(p){
    btn.textContent = p<=0 ? "(按住 T 键 3 秒)" : (p>=1? "抱住了 🫶" : "抱紧中… "+Math.ceil(3-3*p)+"  ");
    // 烟花图随进度由淡到浓
    if(fwLayer){ fwLayer.style.pointerEvents="none"; }
    if(fwImg){ fwImg.style.opacity = (p*0.95).toFixed(3); fwImg.style.transform = "translate(-50%,-50%) scale("+(0.7+p*0.45).toFixed(3)+")"; }
  }
  function tick(){
    if(!holding) return;
    const p=Math.min(1,(performance.now()-start)/HOLD);
    progressUI(p);
    if(p>=1){ success(); return; }
    raf=requestAnimationFrame(tick);
  }
  function down(){
    if(done||holding) return;
    holding=true; start=performance.now();
    if(fwLayer) fwLayer.classList.add("on");
    raf=requestAnimationFrame(tick);
  }
  function up(){
    if(done) return;
    holding=false; if(raf)cancelAnimationFrame(raf);
    progressUI(0);
    if(fwImg) fwImg.style.opacity="0";
    if(fwLayer) fwLayer.classList.remove("on");
  }
  function success(){
    done=true; holding=false;
    if(fwImg){ fwImg.style.opacity="1"; fwImg.style.transform="translate(-50%,-50%) scale(1.15)"; }
    burst();
    btn.textContent="抱住了 🫶";
    cleanup();
    setTimeout(()=>{
      if(fwLayer) fwLayer.classList.remove("on");
      if(fwImg) fwImg.style.opacity="0";
      count++; cur=goNode; render();
    }, 2200);
  }
  function onKeyDown(e){ if((e.key==="t"||e.key==="T")&&!e.repeat) down(); }
  function onKeyUp(e){ if(e.key==="t"||e.key==="T") up(); }
  function cleanup(){
    document.removeEventListener("keydown",onKeyDown);
    document.removeEventListener("keyup",onKeyUp);
    btn.removeEventListener("mousedown",down);
    btn.removeEventListener("mouseup",up);
    btn.removeEventListener("mouseleave",up);
    btn.removeEventListener("touchstart",tdown);
    btn.removeEventListener("touchend",up);
    hugCleanup=null;
  }
  function tdown(e){ e.preventDefault(); down(); }
  // 键盘（电脑）
  document.addEventListener("keydown",onKeyDown);
  document.addEventListener("keyup",onKeyUp);
  // 兼容鼠标/触屏按住（手机没T键时也能用）
  btn.addEventListener("mousedown",down);
  btn.addEventListener("mouseup",up);
  btn.addEventListener("mouseleave",up);
  btn.addEventListener("touchstart",tdown,{passive:false});
  btn.addEventListener("touchend",up);
  progressUI(0);
  hugCleanup=cleanup;
}

render();


// 小黄人贴纸：点它们说话
// 小猪说话：自称“居”、会哼哼
const pigLines=["哼哼~居是妈妈的小猪呀。","哼唧哼唧…居错啦,抱抱嘛~","居最爱妈妈了啦,哼~","妈妈别气啦,居给你拱拱~","哼哼!居会乖乖的啦~","居想妈妈了…哼唧。","妈妈妈妈,居跟你和好好不好嘛~"];
const bobLines=["巴拿拿~抱着小熊来抱抱妈妈啦！","波拿那~妈妈别气，抱一个嘛~","我和小熊都想你了，妈妈~","软软的抱抱，送给你~","妈妈辛苦了，mua~"];
const djLines=["和好吧。这事儿，听我的。","别气了。酷的人不记仇。","节奏我来，你只管开心。","这首歌，叫《对不起》。","行了行了，抱一个，完事。"];
const bubble=document.getElementById("bubble");
const pigimg=document.getElementById("pigimg");
let bubbleTimer=null;
function say(arr,el,rot){
  bubble.textContent=arr[Math.random()*arr.length|0];
  bubble.classList.add("show");
  const old=el.style.transform;
  el.style.transform=`scale(1.12) rotate(${rot}deg)`;
  setTimeout(()=>el.style.transform=old,180);
  clearTimeout(bubbleTimer);
  bubbleTimer=setTimeout(()=>bubble.classList.remove("show"),2600);
}
pigimg.addEventListener("click",()=>say(pigLines,pigimg,-2));
document.getElementById("stickerBob").addEventListener("click",function(){say(bobLines,this,11);});
document.getElementById("stickerDj").addEventListener("click",function(){say(djLines,this,-13);});
</script>
</body>
</html>
